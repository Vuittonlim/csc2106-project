<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIT Canteen Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f7f8fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1a1a1a;
      font-size: 15px;
      line-height: 1.5;
    }

    /* Top nav bar */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-title { font-weight: 700; font-size: 1rem; }
    .topbar-sub   { font-size: 0.78rem; color: #888; margin-top: 1px; }
    .live-row { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #888; }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #d1d5db;
    }
    .live-dot.on { background: #22c55e; }

    /* Page */
    .page { max-width: 880px; margin: 0 auto; padding: 28px 20px 60px; }

    /* Grid helpers */
    .row    { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .col    { flex: 1; min-width: 0; }

    /* Card */
    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 20px 22px;
    }
    .card-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #aaa;
      margin-bottom: 8px;
    }

    /* Crowd level card */
    .level-big {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }
    .level-LOW    { color: #16a34a; }
    .level-MEDIUM { color: #d97706; }
    .level-HIGH   { color: #dc2626; }
    .level-UNKNOWN{ color: #aaa; }

    /* People count card */
    .count-big {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .count-sub { font-size: 0.85rem; color: #888; }

    /* Density bar */
    .density-bar-bg {
      height: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      overflow: hidden;
      margin: 12px 0 6px;
    }
    .density-bar-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.6s ease, background 0.4s;
    }
    .density-pct { font-size: 0.82rem; color: #888; }

    /* Best time card */
    .besttime-val {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .besttime-sub { font-size: 0.82rem; color: #888; }

    /* Trend card */
    .trend-val {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .trend-up   { color: #dc2626; }
    .trend-down { color: #16a34a; }
    .trend-flat { color: #888; }

    /* Environment */
    .env-grid {
      display: flex;
      gap: 28px;
    }
    .env-item {}
    .env-val { font-size: 1.5rem; font-weight: 700; }
    .env-unit { font-size: 0.9rem; font-weight: 400; color: #888; }
    .env-lbl { font-size: 0.78rem; color: #aaa; margin-top: 2px; }

    /* Zone grid */
    .zones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 500px) { .zones-grid { grid-template-columns: 1fr; } }

    .zone-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 18px 20px;
    }
    .zone-name   { font-size: 0.78rem; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .zone-pct    { font-size: 2rem; font-weight: 800; line-height: 1; margin-bottom: 10px; }
    .zone-bar-bg { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .zone-bar    { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .zone-tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .tag-L { background: #dcfce7; color: #15803d; }
    .tag-M { background: #fef9c3; color: #a16207; }
    .tag-H { background: #fee2e2; color: #b91c1c; }

    /* Recommendation */
    .rec-heading { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .rec-reason  { font-size: 0.88rem; color: #555; margin-bottom: 8px; }
    .rec-alts    { font-size: 0.82rem; color: #888; }

    /* Divider */
    .divider { height: 1px; background: #f0f0f0; margin: 16px 0; }

    /* Alert */
    .alert {
      border: 1px solid #fca5a5;
      background: #fff5f5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #b91c1c;
      margin-bottom: 10px;
    }

    /* Section label */
    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #bbb;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div>
    <div class="topbar-title">Canteen Crowd Monitor</div>
    <div class="topbar-sub">Singapore Institute of Technology</div>
  </div>
  <div class="live-row">
    <div class="live-dot" id="liveDot"></div>
    <span id="statusText">Loading</span>
    <span style="color:#ddd">|</span>
    <span id="updatedAt">—</span>
  </div>
</div>

<div class="page">

  <!-- Row 1: People + Level + Best time + Trend -->
  <div class="row">
    <div class="col card">
      <div class="card-label">Right now</div>
      <div class="count-big" id="peopleCount">—</div>
      <div class="count-sub">people in the canteen</div>
      <div class="density-bar-bg">
        <div class="density-bar-fill" id="densityBar" style="width:0%"></div>
      </div>
      <div class="density-pct" id="densityPct">0% full</div>
      <div style="margin-top:10px;font-size:0.85rem;color:#888;">🌡️ <span id="tempVal">—</span> °C</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:16px;flex:1;min-width:0">
      <div class="card" style="flex:1">
        <div class="card-label">Crowd level</div>
        <div class="level-big level-UNKNOWN" id="levelVal">—</div>
      </div>
      <div class="row" style="margin-bottom:0">
        <div class="col card">
          <div class="card-label">Best time to go</div>
          <div class="besttime-val" id="bestTimeVal">—</div>
        </div>
        <div class="col card">
          <div class="card-label">Trend</div>
          <div class="trend-val trend-flat" id="trendVal">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Zones -->
  <div class="section-label">Seating zones</div>
  <div class="zones-grid" id="zonesGrid"></div>

  <!-- Recommendation -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-label">Suggestion</div>
    <div class="rec-heading" id="recZone">—</div>
    <div class="rec-reason" id="recReason">Waiting for data…</div>
    <div class="rec-alts"   id="recAlts"></div>
  </div>

  <!-- Alerts -->
  <div id="alertsWrap"></div>

</div>

<script>
  const POLL_MS = 5000;

  const BEST_TIME_MAP = {
    "NOW":          "Now is fine",
    "SOON":         "Go soon",
    "LATER":        "Wait a bit",
    "AVOID(PEAK)":  "Avoid — it's peak hours",
  };

  const TREND_MAP = {
    "INCREASING": { text: "Getting busier",  cls: "trend-up"   },
    "DECREASING": { text: "Getting quieter", cls: "trend-down" },
    "STABLE":     { text: "About the same",  cls: "trend-flat" },
  };

  const LEVEL_LABEL = { LOW: "Low", MEDIUM: "Medium", HIGH: "High" };
  const BAR_COLOR   = { LOW: "#22c55e", MEDIUM: "#f59e0b", HIGH: "#ef4444" };
  const ZONE_COLOR  = { L: "#22c55e",  M: "#f59e0b",       H: "#ef4444"   };

  function fmtTime(iso) {
    try { return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }); }
    catch { return "—"; }
  }

  function render(d) {
    const live = !!d.live;
    document.getElementById("liveDot").className    = "live-dot" + (live ? " on" : "");
    document.getElementById("statusText").textContent = live ? "Live" : "Sample data";
    document.getElementById("updatedAt").textContent  = fmtTime(d.last_updated);

    // People
    document.getElementById("peopleCount").textContent = d.totalPeople ?? "—";

    // Density bar
    const pct = typeof d.density === "number" ? Math.round(d.density * 100) : 0;
    const bar = document.getElementById("densityBar");
    bar.style.width      = pct + "%";
    bar.style.background = BAR_COLOR[d.level] || "#ccc";
    document.getElementById("densityPct").textContent = pct + "% full";

    // Level
    const lvlEl = document.getElementById("levelVal");
    lvlEl.textContent = LEVEL_LABEL[d.level] || d.level || "—";
    lvlEl.className   = "level-big level-" + (d.level || "UNKNOWN");

    // Best time
    document.getElementById("bestTimeVal").textContent = BEST_TIME_MAP[d.bestTime] || d.bestTime || "—";

    // Trend
    const tr = TREND_MAP[d.trend] || { text: d.trend || "—", cls: "trend-flat" };
    const trEl = document.getElementById("trendVal");
    trEl.textContent = tr.text;
    trEl.className   = "trend-val " + tr.cls;

    // Temperature
    document.getElementById("tempVal").textContent = typeof d.temperature === "number"
      ? d.temperature.toFixed(1) : "—";

    // Zones
    const LEVEL_COLOR = { Low: "#22c55e", Medium: "#f59e0b", High: "#ef4444" };
    const LEVEL_TAG   = { Low: "tag-L",   Medium: "tag-M",   High: "tag-H"   };
    const grid = document.getElementById("zonesGrid");
    grid.innerHTML = (d.zones || []).map(z => {
      const lvl   = z.level || "Unknown";
      const color = LEVEL_COLOR[lvl] || "#aaa";
      const tag   = LEVEL_TAG[lvl]   || "tag-L";
      return `
        <div class="zone-card">
          <div class="zone-name">${z.zone}</div>
          <div style="font-size:1.8rem;font-weight:800;color:${color}">${lvl}</div>
        </div>`;
    }).join("");

    // Recommendation
    const rec = d.recommendation || {};
    document.getElementById("recZone").textContent  = rec.preferred_zone ? "Head to " + rec.preferred_zone : "—";
    document.getElementById("recReason").textContent = rec.reason || "";
    const alts = rec.alternatives || [];
    document.getElementById("recAlts").textContent  = alts.length ? "Also fine: " + alts.join(", ") : "";

    // Alerts
    const alerts = rec.alerts || [];
    document.getElementById("alertsWrap").innerHTML = alerts
      .map(a => `<div class="alert">${a}</div>`).join("");
  }

  async function poll() {
    try {
      const resp = await fetch("/api/status");
      const d    = await resp.json();
      if (!resp.ok || d.live === false) {
        document.getElementById("liveDot").className      = "live-dot";
        document.getElementById("statusText").textContent = d.message || "No data loaded";
        document.getElementById("updatedAt").textContent  = "—";
        return;
      }
      render(d);
    } catch {
      document.getElementById("statusText").textContent = "Connection error";
    }
  }

  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
